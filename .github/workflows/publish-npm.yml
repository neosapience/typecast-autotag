name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @neosapience/typecast-autotag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.2

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Upgrade npm
        run: npm install -g npm@11.12.1

      - name: Check OIDC availability
        run: |
          test -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /tmp/npm-trusted-publisher.npmrc
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public
