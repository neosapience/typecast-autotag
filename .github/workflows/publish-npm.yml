name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @neosapience/typecast-autotag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 9.15.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Upgrade npm
        run: npm install -g npm@11.12.1

      - name: Check OIDC availability
        run: |
          test -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN"
          test -n "$ACTIONS_ID_TOKEN_REQUEST_URL"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
          NPM_CONFIG_USERCONFIG: /tmp/npm-trusted-publisher.npmrc
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public
